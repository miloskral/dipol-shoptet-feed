name: Katalog pre picker (dipol -> catalog_*.json)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Vygenerovat katalogy pre picker
        run: python catalog_scraper.py

      - name: Ulozit katalogy do repozitara
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add catalog_*.json
          git diff --staged --quiet || git commit -m "Auto-aktualizacia katalogov pre picker"
          git push
